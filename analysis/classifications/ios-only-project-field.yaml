# Case 4 — iOS-only Project extension (platform-axis counterfactual)
#
# Anomaly taxonomy locked BEFORE running ./gradlew check on the experiment branch.
# Any file classified as an anomaly here was defined as such before observing the result.
#
# Synthetic change: create new module feat/projects/fe/app/model/ (mirroring be/app/model/
# pattern) with a single IosAppProject interface + IosAppProjectData data class in iosMain.
# Interface extends shared AppProject and adds widgetPinned: Boolean — iOS home screen
# widget pinning (WidgetKit is Apple-only; Android widgets have different semantics,
# web has no widgets).
