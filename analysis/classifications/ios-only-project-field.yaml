# Layer rationale:
#   - business/model is platform-agnostic analytical domain → no iOS-only field belongs there
#   - app/model is FE+BE shared → no FE-only field belongs there
#   - be/app/model is BE-specific → FE concern cannot go there
#   - fe/app/model does not yet exist; Case 4 creates it mirroring be/app/model
#
# Claim under test: legitimate touches are limited to the new module's own files plus one
# settings.gradle.kts include line (intrinsic per existing settings_gradle ripple rule).
# Any touch elsewhere is a platform-axis SoC anomaly.
#
# Anomaly taxonomy:
#
# | Touch                                                                 | Severity     | Why anomaly                                                 |
# |-----------------------------------------------------------------------|--------------|-------------------------------------------------------------|
# | New feat/projects/fe/app/model/**                                     | not anomaly  | Expected carrier of the FE-iOS-only attribute               |
# | settings.gradle.kts include for new module                            | not anomaly  | Covered by existing settings_gradle ripple rule (intrinsic) |
# | feat/projects/**/src/commonMain/** (existing modules)                 | critical     | Platform concern leaking into platform-agnostic code        |
# | feat/projects/business/model/**                                       | critical     | Platform/FE concern leaking to domain layer                 |
# | feat/projects/app/model/**                                            | critical     | FE-iOS concern leaking to FE+BE shared layer                |
# | feat/projects/be/**                                                   | critical     | FE concern leaking to BE                                    |
# | feat/projects/fe/app/model/src/commonMain/** or any non-iOS set       | critical     | iOS concern leaking within the new FE module                |
