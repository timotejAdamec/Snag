#
# Builds multi-platform release artifacts and creates a GitHub Release when a version tag is pushed.
#

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  ORG_GRADLE_JVMARGS: '-Xmx4g'
  KOTLIN_DAEMON_JVMARGS: '-Xmx8g'
  GRADLE_WORKERS_MAX: '4'

jobs:
  linux-builds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode keystore
        run: |
          mkdir -p androidApp/keystore
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > androidApp/keystore/release.jks

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android release APK
        run: ./gradlew :androidApp:assembleRelease
        env:
          SNAG_RELEASE_STOREFILE: keystore/release.jks
          SNAG_RELEASE_STOREPASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          SNAG_RELEASE_KEYALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          SNAG_RELEASE_KEYPASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Build Linux DEB
        run: ./gradlew :composeApp:packageReleaseDeb

      - name: Build JS distribution
        run: ./gradlew :composeApp:jsBrowserDistribution

      - name: Build WasmJS distribution
        run: ./gradlew :composeApp:wasmJsBrowserDistribution

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: androidApp/build/outputs/apk/release/*.apk

      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: composeApp/build/compose/binaries/main-release/deb/*.deb

      - name: Zip JS distribution
        run: cd composeApp/build/dist/js/productionExecutable && zip -r "$GITHUB_WORKSPACE/snag-js.zip" .

      - name: Zip WasmJS distribution
        run: cd composeApp/build/dist/wasmJs/productionExecutable && zip -r "$GITHUB_WORKSPACE/snag-wasmjs.zip" .

      - name: Upload JS distribution
        uses: actions/upload-artifact@v4
        with:
          name: js-dist
          path: snag-js.zip

      - name: Upload WasmJS distribution
        uses: actions/upload-artifact@v4
        with:
          name: wasmjs-dist
          path: snag-wasmjs.zip

  macos-builds:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build macOS DMG
        run: ./gradlew :composeApp:packageReleaseDmg

      - name: Build iOS framework
        run: ./gradlew :composeApp:linkReleaseFrameworkIosArm64

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: composeApp/build/compose/binaries/main-release/dmg/*.dmg

      - name: Zip iOS framework
        run: cd composeApp/build/bin/iosArm64/releaseFramework && zip -r "$GITHUB_WORKSPACE/snag-ios-framework.zip" ComposeApp.framework

      - name: Upload iOS framework
        uses: actions/upload-artifact@v4
        with:
          name: ios-framework
          path: snag-ios-framework.zip

  windows-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Windows MSI
        run: ./gradlew :composeApp:packageReleaseMsi

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: composeApp/build/compose/binaries/main-release/msi/*.msi

  release:
    runs-on: ubuntu-latest
    needs: [linux-builds, macos-builds, windows-build]
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/android-apk/*.apk
            artifacts/linux-deb/*.deb
            artifacts/js-dist/snag-js.zip
            artifacts/wasmjs-dist/snag-wasmjs.zip
            artifacts/macos-dmg/*.dmg
            artifacts/ios-framework/snag-ios-framework.zip
            artifacts/windows-msi/*.msi
