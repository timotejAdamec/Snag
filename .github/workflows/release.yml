#
# Builds a signed release APK and creates a GitHub Release when a version tag is pushed.
#

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > androidApp/keystore/release.jks
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: ./gradlew :androidApp:assembleRelease
        env:
          SNAG_RELEASE_STOREFILE: keystore/release.jks
          SNAG_RELEASE_STOREPASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          SNAG_RELEASE_KEYALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          SNAG_RELEASE_KEYPASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          ORG_GRADLE_JVMARGS: '-Xmx4g'
          KOTLIN_DAEMON_JVMARGS: '-Xmx8g'
          GRADLE_WORKERS_MAX: '4'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: androidApp/build/outputs/apk/release/*.apk
