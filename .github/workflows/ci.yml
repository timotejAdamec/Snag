name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure Gradle memory for CI
        run: |
          printf "\norg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g\nkotlin.daemon.jvmargs=-Xmx8g\norg.gradle.workers.max=4\n" >> gradle.properties

      - name: Run Check
        # WasmJs tests are excluded: compiling them links the full dependency closure
        # into a single binary, which consistently OOMs the Kotlin daemon on the
        # 16 GB ubuntu-latest runner. JS tests cover the same code paths.
        run: ./gradlew check --stacktrace -x wasmJsBrowserTest -x wasmJsNodeTest
