name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure Gradle memory for CI
        run: |
          printf "\norg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g\nkotlin.daemon.jvmargs=-Xmx8g\norg.gradle.workers.max=4\n" >> gradle.properties

      - name: Run Check
        # Browser-based tests (JS/WasmJs) are excluded: they spawn Chromium on top of
        # heavy Kotlin IR compilation and consistently OOM-kill the runner (silently,
        # via Linux OOM killer). JVM tests cover the same shared logic and remain enabled.
        run: ./gradlew check --stacktrace -x jsBrowserTest -x wasmJsBrowserTest
