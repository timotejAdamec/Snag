name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - dev
          - demo

env:
  REGION: europe-west3
  SERVICE_NAME: snag-server-${{ github.event.inputs.environment }}
  IMAGE: europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/snag/server:${{ github.sha }}

jobs:
  deploy:
    name: Deploy (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.IMAGE }} .
          docker push ${{ env.IMAGE }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          flags: >-
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=2
            --allow-unauthenticated
          env_vars: |
            SNAG_PORT=${{ vars.SNAG_PORT }}
            SNAG_GCS_BUCKET_NAME=${{ vars.SNAG_GCS_BUCKET_NAME }}
            SNAG_CORS_ALLOWED_HOSTS=${{ vars.SNAG_CORS_ALLOWED_HOSTS }}
            SNAG_SEED_DATA=${{ vars.SNAG_SEED_DATA }}
            SNAG_LOG_LEVEL=${{ vars.SNAG_LOG_LEVEL }}
            SNAG_MOCK_AUTH=${{ vars.SNAG_MOCK_AUTH }}
            SNAG_ENTRA_ID_TENANT_ID=${{ vars.SNAG_ENTRA_ID_TENANT_ID }}
            SNAG_ENTRA_ID_CLIENT_ID=${{ vars.SNAG_ENTRA_ID_CLIENT_ID }}
